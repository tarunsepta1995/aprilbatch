name: Terraform AWS

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.5.0

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::980637429038:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd terraform-assignment
          terraform init

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform-assignment
          terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Comment PR with Plan
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = `Terraform Plan - ${{ github.run_number }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: planOutput
            });
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform-assignment/tfplan
          retention-days: 5

  approval:
    needs: terraform
    runs-on: ubuntu-latest
    if: success()

    environment:
      name: production

    steps:
      - name: Waiting for approval
        run: echo "Waiting for manual approval to proceed..."

  apply:
    needs: [terraform, approval]
    runs-on: ubuntu-latest
    if: success()

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::980637429038:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan
        uses: actions/download-artifact@v3
        with:
          name: tfplan
          path: terraform-assignment/

      - name: Terraform Apply
        run: |
          cd terraform-assignment
          terraform apply -no-color -auto-approve tfplan

      - name: Upload Apply Output
        uses: actions/upload-artifact@v3
        with:
          name: apply-output
          path: terraform-assignment/
          retention-days: 30
